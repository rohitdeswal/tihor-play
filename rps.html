<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors — tihor.play</title>
    <link rel="icon" href="assets/logo.png">
    <link rel="stylesheet" href="rps.css">
</head>
<body>
    

  
  <div class="navbar">
    <a href="index.html" class="logo">
      <img src="assets/title.png">
    </a>

    <a href="index.html#about" class="about-btn">About Me</a>
  </div>

  
  <div class="game-wrapper">
    <h1>Rock Paper Scissors</h1>
    <h2>Make your move!</h2>

    

    <div class="score-board">
        <div>Wins <div id="wins">0</div></div>
        <div>Ties <div id="ties">0</div></div>
        <div>Losses <div id="losses">0</div></div>
    </div>

    

    <div class="result">
      <div class="player">?</div>
      <div class="vs">VS</div>
      <div class="computer">?</div>
    </div>

    

    <div class="choices">
       <div class="choice" id="rock"><img src="assets/r.png"></div>
       <div class="choice" id="paper"><img src="assets/p.png"></div>
       <div class="choice" id="scissors"><img src="assets/s.png"></div>
    </div>

  </div>

  <script src="rps.js"></script>

</body>
</html>
